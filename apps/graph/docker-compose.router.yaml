services:
  router:
    image: ghcr.io/wundergraph/cosmo/router:latest
    container_name: rehearsal-cosmo-router
    ports:
      - "3002:3002"
    environment:
      - DEV_MODE=true
      - ROUTER_CONFIG_PATH=/app/config.yaml
      - EXECUTION_CONFIG_FILE_PATH=/app/router.json
      - LISTEN_ADDR=0.0.0.0:3002
      - GRAPH_API_TOKEN=
    volumes:
      - ./router.json:/app/router.json:ro
      - ./router-config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
