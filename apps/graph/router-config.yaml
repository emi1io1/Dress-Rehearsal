version: "1"

# Local dev mode: no Cosmo Cloud, no auth. The router reads its execution
# config from the static file generated by `wgc router compose`.
dev_mode: true

listen_addr: "0.0.0.0:3002"

cors:
  allow_origins: ["*"]
  allow_methods: ["POST", "OPTIONS"]
  allow_headers: ["*"]

execution_config:
  file:
    path: "/app/router.json"
    watch: true

graph:
  token: ""
